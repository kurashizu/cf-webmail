<!doctype html>
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)" />
		<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
		<meta name="color-scheme" content="dark light" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="KRSZ Mail" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="application-name" content="KRSZ Mail" />
		<meta name="format-detection" content="telephone=no" />
		<link rel="icon" href="/favicon.ico" type="image/x-icon" sizes="128x128" />
		<link rel="icon" href="/icon.png" type="image/png" sizes="128x128" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500;1,700&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
		<script>
			// Register the service worker that ships from /sw.js. Skip in
			// environments where Service Worker isn't available (SSR, sandboxes).
			if ('serviceWorker' in navigator) {
				window.addEventListener('load', () => {
					navigator.serviceWorker
						.register('/sw.js', { scope: '/' })
						.catch(() => {
							/* offline support is a nice-to-have; never block the UI */
						});
				});
			}
		</script>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
